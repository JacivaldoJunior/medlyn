<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medlyn - Anamnese</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="logo"><span class="logo-icon">💙</span><span class="logo-text">Medlyn</span></div>
    <nav>
      <a href="index.html" class="nav-item">📅 Agenda</a>
      <a href="prontuario.html" class="nav-item">🧾 Prontuário</a>
      <a href="financeiro.html" class="nav-item">💰 Financeiro</a>
      <a href="estoque.html" class="nav-item">📦 Estoque</a>
      <a href="contratos.html" class="nav-item">📄 Contratos</a>
      <a href="campanhas.html" class="nav-item">📢 Campanhas</a>
      <a href="pacientes.html" class="nav-item">👥 Pacientes</a>
      <a href="anamnese.html" class="nav-item active">🧠 Anamnese</a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>🧠 Anamnese Digital</h1>
      <button class="btn btn-purple" onclick="abrirModal()">+ Nova Anamnese</button>
    </div>

    <div class="search-bar">
      <input type="text" id="busca" placeholder="Buscar por paciente..." oninput="filtrar()" />
      <select id="filtro-status" onchange="filtrar()" style="padding:10px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:14px">
        <option value="">Todos</option>
        <option value="em_andamento">Em Andamento</option>
        <option value="concluido">Concluído</option>
      </select>
    </div>

    <div class="table-container">
      <table class="data-table">
        <thead>
          <tr><th>Paciente</th><th>Data</th><th>Objetivo</th><th>Alergias</th><th>Status</th><th>Ações</th></tr>
        </thead>
        <tbody id="tabela-anamnese">
          <tr><td colspan="6" style="text-align:center;padding:40px;color:#aaa">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal" style="max-width:600px">
    <h2>🧠 Ficha de Anamnese</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Paciente *</label>
        <input type="text" id="paciente_nome" placeholder="Nome completo" />
      </div>
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="data" />
      </div>
    </div>

    <div class="form-group">
      <label>Objetivo do Tratamento</label>
      <textarea id="objetivo" rows="2" placeholder="O que deseja melhorar?"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Possui alergias?</label>
        <select id="tem_alergia">
          <option value="Não">Não</option>
          <option value="Sim">Sim</option>
        </select>
      </div>
      <div class="form-group">
        <label>Quais alergias?</label>
        <input type="text" id="alergias" placeholder="Descreva as alergias..." />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Usa medicamentos?</label>
        <select id="usa_medicamentos">
          <option value="Não">Não</option>
          <option value="Sim">Sim</option>
        </select>
      </div>
      <div class="form-group">
        <label>Quais medicamentos?</label>
        <input type="text" id="medicamentos" placeholder="Liste os medicamentos..." />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Grávida ou amamentando?</label>
        <select id="gravida">
          <option value="Não">Não</option>
          <option value="Sim">Sim</option>
        </select>
      </div>
      <div class="form-group">
        <label>Doenças pré-existentes</label>
        <input type="text" id="doencas" placeholder="Ex: Diabetes, Hipertensão..." />
      </div>
    </div>

    <div class="form-group">
      <label>Tratamentos estéticos anteriores</label>
      <textarea id="tratamentos_anteriores" rows="2" placeholder="Já realizou procedimentos? Quais?"></textarea>
    </div>

    <div class="form-group">
      <label>Expectativas e observações</label>
      <textarea id="expectativas" rows="2" placeholder="Outras informações relevantes..."></textarea>
    </div>

    <div class="form-group">
      <label>Status</label>
      <select id="status">
        <option value="em_andamento">Em Andamento</option>
        <option value="concluido">Concluído</option>
      </select>
    </div>

    <div class="modal-footer">
      <button class="btn btn-gray" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-purple" onclick="salvar()">💾 Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let anamneses = [];
  let editId = null;

  async function load() {
    const { data } = await supabase.from('anamneses').select('*').order('created_at', {ascending: false});
    anamneses = data || [];
    filtrar();
  }

  function filtrar() {
    const q = document.getElementById('busca').value.toLowerCase();
    const s = document.getElementById('filtro-status').value;
    let rows = anamneses;
    if (q) rows = rows.filter(r => r.paciente_nome?.toLowerCase().includes(q));
    if (s) rows = rows.filter(r => r.status === s);
    render(rows);
  }

  function render(rows) {
    const tbody = document.getElementById('tabela-anamnese');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:#aaa">Nenhuma anamnese encontrada</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td><strong>${r.paciente_nome}</strong></td>
        <td>${r.data ? new Date(r.data+'T00:00:00').toLocaleDateString('pt-BR') : '-'}</td>
        <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.objetivo || '-'}</td>
        <td>${r.tem_alergia === 'Sim' ? `<span class="badge badge-danger">⚠️ Sim</span>` : '<span class="badge badge-success">Não</span>'}</td>
        <td><span class="badge ${r.status === 'concluido' ? 'badge-success' : 'badge-warning'}">${r.status === 'concluido' ? 'Concluído' : 'Em Andamento'}</span></td>
        <td>
          <button class="btn-sm btn-outline" onclick="editar('${r.id}')">✏️ Ver</button>
          <button class="btn-sm btn-outline" onclick="deletar('${r.id}')" style="margin-left:4px">🗑️</button>
        </td>
      </tr>
    `).join('');
  }

  function abrirModal(dados = null) {
    editId = dados?.id || null;
    document.getElementById('paciente_nome').value = dados?.paciente_nome || '';
    document.getElementById('data').value = dados?.data || new Date().toISOString().split('T')[0];
    document.getElementById('objetivo').value = dados?.objetivo || '';
    document.getElementById('tem_alergia').value = dados?.tem_alergia || 'Não';
    document.getElementById('alergias').value = dados?.alergias || '';
    document.getElementById('usa_medicamentos').value = dados?.usa_medicamentos || 'Não';
    document.getElementById('medicamentos').value = dados?.medicamentos || '';
    document.getElementById('gravida').value = dados?.gravida || 'Não';
    document.getElementById('doencas').value = dados?.doencas || '';
    document.getElementById('tratamentos_anteriores').value = dados?.tratamentos_anteriores || '';
    document.getElementById('expectativas').value = dados?.expectativas || '';
    document.getElementById('status').value = dados?.status || 'em_andamento';
    document.getElementById('modal').classList.add('open');
  }

  function fecharModal() { document.getElementById('modal').classList.remove('open'); }

  async function salvar() {
    const payload = {
      paciente_nome: document.getElementById('paciente_nome').value,
      data: document.getElementById('data').value,
      objetivo: document.getElementById('objetivo').value,
      tem_alergia: document.getElementById('tem_alergia').value,
      alergias: document.getElementById('alergias').value,
      usa_medicamentos: document.getElementById('usa_medicamentos').value,
      medicamentos: document.getElementById('medicamentos').value,
      gravida: document.getElementById('gravida').value,
      doencas: document.getElementById('doencas').value,
      tratamentos_anteriores: document.getElementById('tratamentos_anteriores').value,
      expectativas: document.getElementById('expectativas').value,
      status: document.getElementById('status').value,
    };
    let erro;
    if (editId) {
      ({ error: erro } = await supabase.from('anamneses').update(payload).eq('id', editId));
    } else {
      ({ error: erro } = await supabase.from('anamneses').insert(payload));
    }
    if (erro) { showToast('Erro: ' + erro.message, 'error'); return; }
    showToast('Anamnese salva!', 'success');
    fecharModal();
    load();
  }

  function editar(id) { abrirModal(anamneses.find(a => a.id === id)); }

  async function deletar(id) {
    if (!confirm('Excluir anamnese?')) return;
    await supabase.from('anamneses').delete().eq('id', id);
    showToast('Removida!');
    load();
  }

  function showToast(msg, tipo = '') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast show ${tipo}`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  load();
</script>
</body>
</html>
