<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medlyn - Pacientes</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="logo"><span class="logo-icon">💙</span><span class="logo-text">Medlyn</span></div>
    <nav>
      <a href="index.html" class="nav-item">📅 Agenda</a>
      <a href="prontuario.html" class="nav-item">🧾 Prontuário</a>
      <a href="financeiro.html" class="nav-item">💰 Financeiro</a>
      <a href="estoque.html" class="nav-item">📦 Estoque</a>
      <a href="contratos.html" class="nav-item">📄 Contratos</a>
      <a href="campanhas.html" class="nav-item">📢 Campanhas</a>
      <a href="pacientes.html" class="nav-item active">👥 Pacientes</a>
      <a href="anamnese.html" class="nav-item">🧠 Anamnese</a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>👥 Cadastro de Pacientes</h1>
      <button class="btn btn-purple" onclick="abrirModal()">+ Novo Paciente</button>
    </div>

    <div class="search-bar">
      <input type="text" id="busca" placeholder="Buscar por nome, CPF ou telefone..." oninput="filtrar()" />
    </div>

    <div class="table-container">
      <table class="data-table">
        <thead>
          <tr><th>Nome</th><th>CPF</th><th>Telefone</th><th>Email</th><th>Cidade</th><th>Ações</th></tr>
        </thead>
        <tbody id="tabela-pacientes">
          <tr><td colspan="6" style="text-align:center;padding:40px;color:#aaa">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>👥 Cadastro de Paciente</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Nome Completo *</label>
        <input type="text" id="nome" placeholder="Nome completo" />
      </div>
      <div class="form-group">
        <label>CPF</label>
        <input type="text" id="cpf" placeholder="000.000.000-00" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Data de Nascimento</label>
        <input type="date" id="nascimento" />
      </div>
      <div class="form-group">
        <label>Gênero</label>
        <select id="genero">
          <option value="">Selecionar</option>
          <option value="Feminino">Feminino</option>
          <option value="Masculino">Masculino</option>
          <option value="Outro">Outro</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Telefone</label>
        <input type="text" id="telefone" placeholder="(11) 99999-9999" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="email@exemplo.com" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>CEP</label>
        <input type="text" id="cep" placeholder="00000-000" onblur="buscarCEP()" />
      </div>
      <div class="form-group">
        <label>Cidade</label>
        <input type="text" id="cidade" placeholder="Cidade" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Bairro</label>
        <input type="text" id="bairro" placeholder="Bairro" />
      </div>
      <div class="form-group">
        <label>Estado</label>
        <input type="text" id="estado" placeholder="SP" />
      </div>
    </div>
    <div class="form-group">
      <label>Endereço</label>
      <input type="text" id="endereco" placeholder="Rua, número..." />
    </div>
    <div class="form-group">
      <label>Observações / Alergias</label>
      <textarea id="observacoes" rows="3" placeholder="Alergias, condições especiais..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-purple" onclick="salvar()">💾 Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let pacientes = [];
  let editId = null;

  async function load() {
    const { data } = await supabase.from('pacientes').select('*').order('nome');
    pacientes = data || [];
    render(pacientes);
  }

  function render(rows) {
    const tbody = document.getElementById('tabela-pacientes');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:#aaa">Nenhum paciente cadastrado</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td><strong>${r.nome}</strong></td>
        <td>${r.cpf || '-'}</td>
        <td>${r.telefone || '-'}</td>
        <td>${r.email || '-'}</td>
        <td>${r.cidade || '-'}</td>
        <td>
          <button class="btn-sm btn-outline" onclick="editar('${r.id}')">✏️</button>
          <button class="btn-sm btn-outline" onclick="deletar('${r.id}')" style="margin-left:4px">🗑️</button>
        </td>
      </tr>
    `).join('');
  }

  function filtrar() {
    const q = document.getElementById('busca').value.toLowerCase();
    render(pacientes.filter(r =>
      r.nome?.toLowerCase().includes(q) ||
      r.cpf?.includes(q) ||
      r.telefone?.includes(q)
    ));
  }

  async function buscarCEP() {
    const cep = document.getElementById('cep').value.replace(/\D/g, '');
    if (cep.length !== 8) return;
    try {
      const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
      const data = await res.json();
      if (!data.erro) {
        document.getElementById('endereco').value = data.logradouro || '';
        document.getElementById('bairro').value = data.bairro || '';
        document.getElementById('cidade').value = data.localidade || '';
        document.getElementById('estado').value = data.uf || '';
        showToast('CEP encontrado!', 'success');
      }
    } catch(e) {}
  }

  function abrirModal(dados = null) {
    editId = dados?.id || null;
    ['nome','cpf','telefone','email','cep','cidade','bairro','estado','endereco','observacoes'].forEach(f => {
      document.getElementById(f).value = dados?.[f] || '';
    });
    document.getElementById('nascimento').value = dados?.nascimento || '';
    document.getElementById('genero').value = dados?.genero || '';
    document.getElementById('modal').classList.add('open');
  }

  function fecharModal() { document.getElementById('modal').classList.remove('open'); }

  async function salvar() {
    const payload = {
      nome: document.getElementById('nome').value,
      cpf: document.getElementById('cpf').value,
      nascimento: document.getElementById('nascimento').value,
      genero: document.getElementById('genero').value,
      telefone: document.getElementById('telefone').value,
      email: document.getElementById('email').value,
      cep: document.getElementById('cep').value,
      endereco: document.getElementById('endereco').value,
      bairro: document.getElementById('bairro').value,
      cidade: document.getElementById('cidade').value,
      estado: document.getElementById('estado').value,
      observacoes: document.getElementById('observacoes').value,
    };
    let erro;
    if (editId) {
      ({ error: erro } = await supabase.from('pacientes').update(payload).eq('id', editId));
    } else {
      ({ error: erro } = await supabase.from('pacientes').insert(payload));
    }
    if (erro) { showToast('Erro: ' + erro.message, 'error'); return; }
    showToast('Paciente salvo!', 'success');
    fecharModal();
    load();
  }

  function editar(id) {
    const r = pacientes.find(p => p.id === id);
    if (r) abrirModal(r);
  }

  async function deletar(id) {
    if (!confirm('Excluir paciente?')) return;
    await supabase.from('pacientes').delete().eq('id', id);
    showToast('Removido!');
    load();
  }

  function showToast(msg, tipo = '') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast show ${tipo}`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  load();
</script>
</body>
</html>
