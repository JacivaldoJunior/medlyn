<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medlyn - Pacientes</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="logo"><span class="logo-icon">💙</span><span class="logo-text">Medlyn</span></div>
    <nav>
      <a href="index.html" class="nav-item">🏠 Dashboard</a>
      <a href="agenda.html" class="nav-item">📅 Agenda</a>
      <a href="prontuario.html" class="nav-item">🧾 Prontuário</a>
      <a href="financeiro.html" class="nav-item">💰 Financeiro</a>
      <a href="estoque.html" class="nav-item">📦 Estoque</a>
      <a href="contratos.html" class="nav-item">📄 Contratos</a>
      <a href="campanhas.html" class="nav-item">📢 Campanhas</a>
      <a href="pacientes.html" class="nav-item active">👥 Pacientes</a>
      <a href="anamnese.html" class="nav-item">🧠 Anamnese</a>
      <a href="usuarios.html" class="nav-item" id="nav-admin" style="display:none">⚙️ Usuários</a>
    </nav>
    <div style="margin-top:auto;padding-top:20px;border-top:1px solid rgba(0,0,0,0.1)">
      <div style="font-weight:600;font-size:14px" id="user-name">-</div>
      <button onclick="logout()" style="margin-top:8px;width:100%;padding:8px;border-radius:8px;border:1.5px solid #c8ccd6;background:white;cursor:pointer;font-size:13px;font-family:inherit">🚪 Sair</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>👥 Cadastro de Pacientes</h1>
      <button class="btn btn-purple" id="btn-novo">+ Novo Paciente</button>
    </div>
    <div class="search-bar">
      <input type="text" id="busca" placeholder="Buscar por nome, CPF ou telefone..."/>
    </div>
    <div class="table-container">
      <table class="data-table">
        <thead><tr><th>Nome</th><th>CPF</th><th>Telefone</th><th>Email</th><th>Cidade</th><th>Ações</th></tr></thead>
        <tbody id="tabela"></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">👥 Novo Paciente</h2>
    <div class="form-row">
      <div class="form-group"><label>Nome Completo *</label><input type="text" id="f-nome" placeholder="Nome completo"/></div>
      <div class="form-group"><label>CPF</label><input type="text" id="f-cpf" placeholder="000.000.000-00"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Data de Nascimento</label><input type="date" id="f-nascimento"/></div>
      <div class="form-group"><label>Gênero</label>
        <select id="f-genero"><option value="">Selecionar</option><option>Feminino</option><option>Masculino</option><option>Outro</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Telefone</label><input type="text" id="f-telefone" placeholder="(11) 99999-9999"/></div>
      <div class="form-group"><label>Email</label><input type="email" id="f-email" placeholder="email@exemplo.com"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>CEP</label><input type="text" id="f-cep" placeholder="00000-000"/></div>
      <div class="form-group"><label>Cidade</label><input type="text" id="f-cidade" placeholder="Cidade"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Bairro</label><input type="text" id="f-bairro" placeholder="Bairro"/></div>
      <div class="form-group"><label>Estado</label><input type="text" id="f-estado" placeholder="SP"/></div>
    </div>
    <div class="form-group"><label>Endereço</label><input type="text" id="f-endereco" placeholder="Rua, número..."/></div>
    <div class="form-group"><label>Observações / Alergias</label><textarea id="f-observacoes" rows="3" placeholder="Alergias, condições especiais..."></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-gray" id="btn-cancelar">Cancelar</button>
      <button class="btn btn-purple" id="btn-salvar">💾 Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let rows = [], editId = null, clinicaId = null;

  async function init() {
    const user = await checkAuth();
    if (!user) return;
    clinicaId = user.clinica_id;
    renderUserHeader();
    if (user.perfil === 'admin') document.getElementById('nav-admin').style.display = 'flex';

    document.getElementById('busca').addEventListener('input', filtrar);
    document.getElementById('btn-novo').addEventListener('click', () => abrirModal());
    document.getElementById('btn-cancelar').addEventListener('click', fecharModal);
    document.getElementById('btn-salvar').addEventListener('click', salvar);
    document.getElementById('f-cep').addEventListener('blur', buscarCEP);

    load();
  }

  async function load() {
    let q = supabase.from('pacientes').select('*').order('nome');
    if (clinicaId) q = q.eq('clinica_id', clinicaId);
    const { data } = await q;
    rows = data || [];
    render(rows);
  }

  function filtrar() {
    const q = document.getElementById('busca').value.toLowerCase();
    render(rows.filter(r => !q || r.nome?.toLowerCase().includes(q) || r.cpf?.includes(q) || r.telefone?.includes(q)));
  }

  function render(lista) {
    const tbody = document.getElementById('tabela');
    if (!lista.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:#aaa">Nenhum paciente cadastrado</td></tr>'; return; }
    tbody.innerHTML = lista.map(r => `
      <tr>
        <td style="padding:14px 18px"><strong>${r.nome}</strong></td>
        <td style="padding:14px 18px">${r.cpf||'-'}</td>
        <td style="padding:14px 18px">${r.telefone||'-'}</td>
        <td style="padding:14px 18px">${r.email||'-'}</td>
        <td style="padding:14px 18px">${r.cidade||'-'}</td>
        <td style="padding:14px 18px">
          <button class="btn-sm btn-outline" data-id="${r.id}" data-action="editar">✏️</button>
          <button class="btn-sm btn-outline" data-id="${r.id}" data-action="deletar" style="margin-left:4px">🗑️</button>
        </td>
      </tr>
    `).join('');
    tbody.querySelectorAll('button[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.action === 'editar') editar(btn.dataset.id);
        else deletar(btn.dataset.id);
      });
    });
  }

  async function buscarCEP() {
    const cep = document.getElementById('f-cep').value.replace(/\D/g, '');
    if (cep.length !== 8) return;
    try {
      const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
      const data = await res.json();
      if (!data.erro) {
        document.getElementById('f-endereco').value = data.logradouro || '';
        document.getElementById('f-bairro').value = data.bairro || '';
        document.getElementById('f-cidade').value = data.localidade || '';
        document.getElementById('f-estado').value = data.uf || '';
        showToast('CEP encontrado!', 'success');
      }
    } catch(e) {}
  }

  function abrirModal(dados=null) {
    editId = dados?.id || null;
    document.getElementById('modal-title').textContent = editId ? '✏️ Editar Paciente' : '👥 Novo Paciente';
    ['nome','cpf','telefone','email','cep','cidade','bairro','estado','endereco','observacoes'].forEach(f => {
      document.getElementById('f-'+f).value = dados?.[f] || '';
    });
    document.getElementById('f-nascimento').value = dados?.nascimento || '';
    document.getElementById('f-genero').value = dados?.genero || '';
    document.getElementById('modal').classList.add('open');
  }

  function fecharModal() { document.getElementById('modal').classList.remove('open'); }

  async function salvar() {
    const payload = {
      nome: document.getElementById('f-nome').value,
      cpf: document.getElementById('f-cpf').value,
      nascimento: document.getElementById('f-nascimento').value || null,
      genero: document.getElementById('f-genero').value,
      telefone: document.getElementById('f-telefone').value,
      email: document.getElementById('f-email').value,
      cep: document.getElementById('f-cep').value,
      endereco: document.getElementById('f-endereco').value,
      bairro: document.getElementById('f-bairro').value,
      cidade: document.getElementById('f-cidade').value,
      estado: document.getElementById('f-estado').value,
      observacoes: document.getElementById('f-observacoes').value,
      clinica_id: clinicaId,
    };
    if (!payload.nome) { showToast('Informe o nome do paciente!', 'error'); return; }
    let erro;
    if (editId) {
      ({ error: erro } = await supabase.from('pacientes').update(payload).eq('id', editId));
    } else {
      ({ error: erro } = await supabase.from('pacientes').insert(payload));
    }
    if (erro) { showToast('Erro: ' + erro.message, 'error'); return; }
    showToast('Paciente salvo!', 'success'); fecharModal(); load();
  }

  function editar(id) { abrirModal(rows.find(r => r.id === id)); }

  async function deletar(id) {
    if (!confirm('Excluir paciente?')) return;
    await supabase.from('pacientes').delete().eq('id', id);
    showToast('Removido!'); load();
  }

  function showToast(msg, tipo='') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast show ${tipo}`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  init();
</script>
</body>
</html>
