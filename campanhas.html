<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medlyn - Campanhas</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="logo"><span class="logo-icon">💙</span><span class="logo-text">Medlyn</span></div>
    <nav>
      <a href="index.html" class="nav-item">🏠 Dashboard</a>
      <a href="agenda.html" class="nav-item">📅 Agenda</a>
      <a href="prontuario.html" class="nav-item">🧾 Prontuário</a>
      <a href="financeiro.html" class="nav-item">💰 Financeiro</a>
      <a href="estoque.html" class="nav-item">📦 Estoque</a>
      <a href="contratos.html" class="nav-item">📄 Contratos</a>
      <a href="campanhas.html" class="nav-item active">📢 Campanhas</a>
      <a href="pacientes.html" class="nav-item">👥 Pacientes</a>
      <a href="anamnese.html" class="nav-item">🧠 Anamnese</a>
      <a href="usuarios.html" class="nav-item" id="nav-admin" style="display:none">⚙️ Usuários</a>
    </nav>
    <div style="margin-top:auto;padding-top:20px;border-top:1px solid rgba(0,0,0,0.1)">
      <div style="font-weight:600;font-size:14px" id="user-name">-</div>
      <button onclick="logout()" style="margin-top:8px;width:100%;padding:8px;border-radius:8px;border:1.5px solid #c8ccd6;background:white;cursor:pointer;font-size:13px;font-family:inherit">🚪 Sair</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>📢 Campanhas de Marketing</h1>
      <button class="btn btn-purple" id="btn-novo">+ Nova Campanha</button>
    </div>

    <div class="cards-top" style="margin-bottom:24px">
      <div class="card card-white"><div class="card-icon">🟢</div><div><div class="card-title">Ativas</div><div class="card-value" id="qtd-ativas">-</div></div></div>
      <div class="card card-white"><div class="card-icon">👆</div><div><div class="card-title">Total Clicks</div><div class="card-value" id="total-clicks">-</div></div></div>
      <div class="card card-purple"><div class="card-icon">🎯</div><div><div class="card-title">Total Leads</div><div class="card-value" id="total-leads">-</div></div></div>
    </div>

    <div class="table-container">
      <table class="data-table">
        <thead><tr><th>Campanha</th><th>Canal</th><th>Início</th><th>Fim</th><th>Clicks</th><th>Leads</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody id="tabela"></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">📢 Nova Campanha</h2>
    <div class="form-group"><label>Nome da Campanha *</label><input type="text" id="f-nome" placeholder="Ex: Promoção Botox Verão"/></div>
    <div class="form-row">
      <div class="form-group"><label>Canal</label>
        <select id="f-canal"><option>Instagram</option><option>WhatsApp</option><option>Email</option><option>TikTok</option><option>Google Ads</option><option>Indicação</option><option>Outro</option></select>
      </div>
      <div class="form-group"><label>Status</label>
        <select id="f-status"><option>Ativa</option><option>Em Andamento</option><option>Pausada</option><option>Encerrada</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Data de Início</label><input type="date" id="f-data_inicio"/></div>
      <div class="form-group"><label>Data de Fim</label><input type="date" id="f-data_fim"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Clicks</label><input type="number" id="f-clicks" placeholder="0"/></div>
      <div class="form-group"><label>Leads</label><input type="number" id="f-leads" placeholder="0"/></div>
    </div>
    <div class="form-group"><label>Orçamento (R$)</label><input type="number" id="f-orcamento" placeholder="0,00" step="0.01"/></div>
    <div class="form-group"><label>Descrição / Objetivo</label><textarea id="f-descricao" rows="3" placeholder="Descreva a campanha..."></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-gray" id="btn-cancelar">Cancelar</button>
      <button class="btn btn-purple" id="btn-salvar">💾 Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let rows = [], editId = null, clinicaId = null;

  async function init() {
    const user = await checkAuth();
    if (!user) return;
    clinicaId = user.clinica_id;
    renderUserHeader();
    if (user.perfil === 'admin') document.getElementById('nav-admin').style.display = 'flex';

    document.getElementById('btn-novo').addEventListener('click', () => abrirModal());
    document.getElementById('btn-cancelar').addEventListener('click', fecharModal);
    document.getElementById('btn-salvar').addEventListener('click', salvar);

    load();
  }

  async function load() {
    let q = supabase.from('campanhas').select('*').order('created_at', {ascending: false});
    if (clinicaId) q = q.eq('clinica_id', clinicaId);
    const { data } = await q;
    rows = data || [];

    document.getElementById('qtd-ativas').textContent = rows.filter(c => c.status === 'Ativa' || c.status === 'Em Andamento').length;
    document.getElementById('total-clicks').textContent = rows.reduce((a,c) => a+(c.clicks||0), 0).toLocaleString('pt-BR');
    document.getElementById('total-leads').textContent = rows.reduce((a,c) => a+(c.leads||0), 0).toLocaleString('pt-BR');

    render(rows);
  }

  function statusBadge(s) {
    if (s === 'Ativa') return 'badge-success';
    if (s === 'Em Andamento') return 'badge-warning';
    if (s === 'Encerrada') return 'badge-danger';
    return 'badge-purple';
  }

  function render(lista) {
    const tbody = document.getElementById('tabela');
    if (!lista.length) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:#aaa">Nenhuma campanha cadastrada</td></tr>'; return; }
    tbody.innerHTML = lista.map(r => `
      <tr>
        <td style="padding:14px 18px"><strong>${r.nome}</strong></td>
        <td style="padding:14px 18px">${r.canal||'-'}</td>
        <td style="padding:14px 18px">${r.data_inicio ? new Date(r.data_inicio+'T00:00:00').toLocaleDateString('pt-BR') : '-'}</td>
        <td style="padding:14px 18px">${r.data_fim ? new Date(r.data_fim+'T00:00:00').toLocaleDateString('pt-BR') : '-'}</td>
        <td style="padding:14px 18px">${(r.clicks||0).toLocaleString('pt-BR')}</td>
        <td style="padding:14px 18px">${(r.leads||0).toLocaleString('pt-BR')}</td>
        <td style="padding:14px 18px"><span class="badge ${statusBadge(r.status)}">${r.status||'-'}</span></td>
        <td style="padding:14px 18px">
          <button class="btn-sm btn-outline" data-id="${r.id}" data-action="editar">✏️</button>
          <button class="btn-sm btn-outline" data-id="${r.id}" data-action="deletar" style="margin-left:4px">🗑️</button>
        </td>
      </tr>
    `).join('');
    tbody.querySelectorAll('button[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.action === 'editar') editar(btn.dataset.id);
        else deletar(btn.dataset.id);
      });
    });
  }

  function abrirModal(dados=null) {
    editId = dados?.id || null;
    document.getElementById('modal-title').textContent = editId ? '✏️ Editar Campanha' : '📢 Nova Campanha';
    document.getElementById('f-nome').value = dados?.nome || '';
    document.getElementById('f-canal').value = dados?.canal || 'Instagram';
    document.getElementById('f-status').value = dados?.status || 'Ativa';
    document.getElementById('f-data_inicio').value = dados?.data_inicio || '';
    document.getElementById('f-data_fim').value = dados?.data_fim || '';
    document.getElementById('f-clicks').value = dados?.clicks || '';
    document.getElementById('f-leads').value = dados?.leads || '';
    document.getElementById('f-orcamento').value = dados?.orcamento || '';
    document.getElementById('f-descricao').value = dados?.descricao || '';
    document.getElementById('modal').classList.add('open');
  }

  function fecharModal() { document.getElementById('modal').classList.remove('open'); }

  async function salvar() {
    const payload = {
      nome: document.getElementById('f-nome').value,
      canal: document.getElementById('f-canal').value,
      status: document.getElementById('f-status').value,
      data_inicio: document.getElementById('f-data_inicio').value || null,
      data_fim: document.getElementById('f-data_fim').value || null,
      clicks: parseInt(document.getElementById('f-clicks').value) || 0,
      leads: parseInt(document.getElementById('f-leads').value) || 0,
      orcamento: parseFloat(document.getElementById('f-orcamento').value) || 0,
      descricao: document.getElementById('f-descricao').value,
      clinica_id: clinicaId,
    };
    if (!payload.nome) { showToast('Informe o nome da campanha!', 'error'); return; }
    let erro;
    if (editId) {
      ({ error: erro } = await supabase.from('campanhas').update(payload).eq('id', editId));
    } else {
      ({ error: erro } = await supabase.from('campanhas').insert(payload));
    }
    if (erro) { showToast('Erro: ' + erro.message, 'error'); return; }
    showToast('Campanha salva!', 'success'); fecharModal(); load();
  }

  function editar(id) { abrirModal(rows.find(r => r.id === id)); }

  async function deletar(id) {
    if (!confirm('Excluir campanha?')) return;
    await supabase.from('campanhas').delete().eq('id', id);
    showToast('Removida!'); load();
  }

  function showToast(msg, tipo='') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast show ${tipo}`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  init();
</script>
</body>
</html>
