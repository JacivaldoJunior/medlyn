<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medlyn - Prontuário</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="logo"><span class="logo-icon">💙</span><span class="logo-text">Medlyn</span></div>
    <nav>
      <a href="index.html" class="nav-item">🏠 Dashboard</a>
      <a href="agenda.html" class="nav-item">📅 Agenda</a>
      <a href="prontuario.html" class="nav-item active">🧾 Prontuário</a>
      <a href="financeiro.html" class="nav-item">💰 Financeiro</a>
      <a href="estoque.html" class="nav-item">📦 Estoque</a>
      <a href="contratos.html" class="nav-item">📄 Contratos</a>
      <a href="campanhas.html" class="nav-item">📢 Campanhas</a>
      <a href="pacientes.html" class="nav-item">👥 Pacientes</a>
      <a href="anamnese.html" class="nav-item">🧠 Anamnese</a>
      <a href="usuarios.html" class="nav-item" id="nav-admin" style="display:none">⚙️ Usuários</a>
    </nav>
    <div style="margin-top:auto;padding-top:20px;border-top:1px solid rgba(0,0,0,0.1)">
      <div style="font-weight:600;font-size:14px" id="user-name">-</div>
      <button onclick="logout()" style="margin-top:8px;width:100%;padding:8px;border-radius:8px;border:1.5px solid #c8ccd6;background:white;cursor:pointer;font-size:13px;font-family:inherit">🚪 Sair</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>🧾 Prontuários</h1>
      <button class="btn btn-purple" id="btn-novo">+ Novo Prontuário</button>
    </div>
    <div class="search-bar">
      <input type="text" id="busca" placeholder="Buscar por paciente..."/>
    </div>
    <div class="table-container">
      <table class="data-table">
        <thead><tr><th>Paciente</th><th>Data</th><th>Procedimento</th><th>Profissional</th><th>Observações</th><th>Ações</th></tr></thead>
        <tbody id="tabela"></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">🧾 Novo Prontuário</h2>
    <div class="form-row">
      <div class="form-group"><label>Paciente *</label><input type="text" id="f-paciente_nome" placeholder="Nome do paciente"/></div>
      <div class="form-group"><label>Data *</label><input type="date" id="f-data"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Procedimento *</label><input type="text" id="f-procedimento" placeholder="Ex: Botox, Preenchimento..."/></div>
      <div class="form-group"><label>Profissional</label><input type="text" id="f-profissional" placeholder="Nome do profissional"/></div>
    </div>
    <div class="form-group"><label>Queixa Principal</label><textarea id="f-queixa" rows="2" placeholder="Relato do paciente..."></textarea></div>
    <div class="form-group"><label>Diagnóstico / Avaliação</label><textarea id="f-diagnostico" rows="2" placeholder="Avaliação clínica..."></textarea></div>
    <div class="form-group"><label>Tratamento Realizado</label><textarea id="f-tratamento" rows="3" placeholder="Descreva o procedimento realizado..."></textarea></div>
    <div class="form-row">
      <div class="form-group"><label>Produtos Utilizados</label><input type="text" id="f-produtos" placeholder="Ex: Botox 50U..."/></div>
      <div class="form-group"><label>Próxima Consulta</label><input type="date" id="f-proxima_consulta"/></div>
    </div>
    <div class="form-group"><label>Observações Pós-Procedimento</label><textarea id="f-observacoes" rows="2" placeholder="Cuidados, recomendações..."></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-gray" id="btn-cancelar">Cancelar</button>
      <button class="btn btn-purple" id="btn-salvar">💾 Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let rows = [], editId = null, clinicaId = null, userName = '';

  async function init() {
    const user = await checkAuth();
    if (!user) return;
    clinicaId = user.clinica_id;
    userName = user.nome;
    renderUserHeader();
    if (user.perfil === 'admin') document.getElementById('nav-admin').style.display = 'flex';

    document.getElementById('busca').addEventListener('input', filtrar);
    document.getElementById('btn-novo').addEventListener('click', () => abrirModal());
    document.getElementById('btn-cancelar').addEventListener('click', fecharModal);
    document.getElementById('btn-salvar').addEventListener('click', salvar);

    load();
  }

  async function load() {
    let q = supabase.from('prontuarios').select('*').order('data', {ascending: false});
    if (clinicaId) q = q.eq('clinica_id', clinicaId);
    const { data } = await q;
    rows = data || [];
    render(rows);
  }

  function render(lista) {
    const tbody = document.getElementById('tabela');
    if (!lista.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:#aaa">Nenhum prontuário encontrado</td></tr>'; return; }
    tbody.innerHTML = lista.map(r => `
      <tr>
        <td style="padding:14px 18px"><strong>${r.paciente_nome}</strong></td>
        <td style="padding:14px 18px">${r.data ? new Date(r.data+'T00:00:00').toLocaleDateString('pt-BR') : '-'}</td>
        <td style="padding:14px 18px">${r.procedimento||'-'}</td>
        <td style="padding:14px 18px">${r.profissional||'-'}</td>
        <td style="padding:14px 18px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.observacoes||'-'}</td>
        <td style="padding:14px 18px">
          <button class="btn-sm btn-outline" data-id="${r.id}" data-action="editar">✏️ Ver</button>
          <button class="btn-sm btn-outline" data-id="${r.id}" data-action="deletar" style="margin-left:4px">🗑️</button>
        </td>
      </tr>
    `).join('');
    document.getElementById('tabela').querySelectorAll('button[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.action === 'editar') editar(btn.dataset.id);
        else deletar(btn.dataset.id);
      });
    });
  }

  function filtrar() {
    const q = document.getElementById('busca').value.toLowerCase();
    render(rows.filter(r => !q || r.paciente_nome?.toLowerCase().includes(q)));
  }

  function abrirModal(dados = null) {
    editId = dados?.id || null;
    document.getElementById('modal-title').textContent = editId ? '✏️ Editar Prontuário' : '🧾 Novo Prontuário';
    document.getElementById('f-paciente_nome').value = dados?.paciente_nome || '';
    document.getElementById('f-data').value = dados?.data || new Date().toISOString().split('T')[0];
    document.getElementById('f-procedimento').value = dados?.procedimento || '';
    document.getElementById('f-profissional').value = dados?.profissional || userName;
    document.getElementById('f-queixa').value = dados?.queixa || '';
    document.getElementById('f-diagnostico').value = dados?.diagnostico || '';
    document.getElementById('f-tratamento').value = dados?.tratamento || '';
    document.getElementById('f-produtos').value = dados?.produtos || '';
    document.getElementById('f-proxima_consulta').value = dados?.proxima_consulta || '';
    document.getElementById('f-observacoes').value = dados?.observacoes || '';
    document.getElementById('modal').classList.add('open');
  }

  function fecharModal() { document.getElementById('modal').classList.remove('open'); }

  async function salvar() {
    const payload = {
      paciente_nome: document.getElementById('f-paciente_nome').value,
      data: document.getElementById('f-data').value,
      procedimento: document.getElementById('f-procedimento').value,
      profissional: document.getElementById('f-profissional').value,
      queixa: document.getElementById('f-queixa').value,
      diagnostico: document.getElementById('f-diagnostico').value,
      tratamento: document.getElementById('f-tratamento').value,
      produtos: document.getElementById('f-produtos').value,
      proxima_consulta: document.getElementById('f-proxima_consulta').value || null,
      observacoes: document.getElementById('f-observacoes').value,
      clinica_id: clinicaId,
    };
    if (!payload.paciente_nome) { showToast('Informe o nome do paciente!', 'error'); return; }
    let erro;
    if (editId) {
      ({ error: erro } = await supabase.from('prontuarios').update(payload).eq('id', editId));
    } else {
      ({ error: erro } = await supabase.from('prontuarios').insert(payload));
    }
    if (erro) { showToast('Erro: ' + erro.message, 'error'); return; }
    showToast('Prontuário salvo!', 'success'); fecharModal(); load();
  }

  function editar(id) { abrirModal(rows.find(r => r.id === id)); }

  async function deletar(id) {
    if (!confirm('Excluir prontuário?')) return;
    await supabase.from('prontuarios').delete().eq('id', id);
    showToast('Removido!'); load();
  }

  function showToast(msg, tipo = '') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast show ${tipo}`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  init();
</script>
</body>
</html>
