<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medlyn - Contratos</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  
  
  
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="logo"><span class="logo-icon">💙</span><span class="logo-text">Medlyn</span></div>
    <nav>
      <a href="index.html" class="nav-item">🏠 Dashboard</a>
      <a href="agenda.html" class="nav-item">📅 Agenda</a>
      <a href="prontuario.html" class="nav-item">🧾 Prontuário</a>
      <a href="financeiro.html" class="nav-item">💰 Financeiro</a>
      <a href="estoque.html" class="nav-item">📦 Estoque</a>
      <a href="contratos.html" class="nav-item active">📄 Contratos</a>
      <a href="campanhas.html" class="nav-item">📢 Campanhas</a>
      <a href="pacientes.html" class="nav-item">👥 Pacientes</a>
      <a href="anamnese.html" class="nav-item">🧠 Anamnese</a>
      <a href="usuarios.html" class="nav-item" id="nav-admin" style="display:none">⚙️ Usuários</a>
    </nav>
    <div style="margin-top:auto;padding-top:20px;border-top:1px solid rgba(0,0,0,0.1)">
      <div style="font-weight:600;font-size:14px" id="user-name">-</div>
      <button onclick="logout()" style="margin-top:8px;width:100%;padding:8px;border-radius:8px;border:1.5px solid #c8ccd6;background:white;cursor:pointer;font-size:13px;font-family:inherit">🚪 Sair</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>📄 Contratos e Termos</h1>
      <button class="btn btn-purple" id="btn-novo">+ Novo Contrato</button>
    </div>
    <div class="search-bar">
      <input type="text" id="busca" placeholder="Buscar por paciente ou tipo..."/>
      <select id="filtro-status" style="padding:10px 16px;border:1.5px solid #c8ccd6;border-radius:10px;font-size:14px;font-family:inherit">
        <option value="">Todos</option><option>Pendente</option><option>Assinado</option><option>Cancelado</option>
      </select>
    </div>
    <div class="table-container">
      <table class="data-table">
        <thead><tr><th>Paciente</th><th>Tipo</th><th>Data</th><th>Procedimento</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody id="tabela"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- MODAL CADASTRO -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">📄 Novo Contrato</h2>
    <div class="form-row">
      <div class="form-group"><label>Paciente *</label><input type="text" id="f-paciente_nome" placeholder="Nome do paciente"/></div>
      <div class="form-group"><label>Data *</label><input type="date" id="f-data"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Tipo de Contrato</label>
        <select id="f-tipo"><option>Contrato Estético</option><option>Contrato Botulínica</option><option>Termo de Consentimento</option><option>Contrato Geral</option></select>
      </div>
      <div class="form-group"><label>Status</label>
        <select id="f-status"><option>Pendente</option><option>Assinado</option><option>Cancelado</option></select>
      </div>
    </div>
    <div class="form-group"><label>Procedimento</label><input type="text" id="f-procedimento" placeholder="Ex: Botox, Preenchimento labial..."/></div>
    <div class="form-group"><label>Conteúdo do Contrato</label><textarea id="f-conteudo" rows="6" placeholder="Texto completo do contrato ou termo..."></textarea></div>
    <div class="form-group"><label>Observações</label><textarea id="f-observacoes" rows="2" placeholder="Notas adicionais..."></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-gray" id="btn-cancelar">Cancelar</button>
      <button class="btn btn-purple" id="btn-salvar">💾 Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL VER -->
<div class="modal-overlay" id="modal-ver">
  <div class="modal" style="max-width:640px">
    <h2 id="ver-titulo">Contrato</h2>
    <div id="ver-info" style="background:#f7f8fc;border-radius:8px;padding:16px;margin-bottom:16px;font-size:13px;line-height:1.8"></div>
    <div id="ver-conteudo" style="background:#fff;border:1px solid #c8ccd6;border-radius:8px;padding:20px;white-space:pre-wrap;font-size:14px;line-height:1.8;max-height:300px;overflow-y:auto"></div>
    <div class="modal-footer">
      <button class="btn btn-gray" id="btn-ver-fechar">Fechar</button>
      <button class="btn btn-purple" id="btn-assinar">✍️ Marcar como Assinado</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
  let rows = [], editId = null, clinicaId = null, verItem = null;

  async function init() {
    const user = await checkAuth();
    if (!user) return;
    clinicaId = user.clinica_id;
    renderUserHeader();
    if (user.perfil === 'admin') document.getElementById('nav-admin').style.display = 'flex';

    document.getElementById('busca').addEventListener('input', filtrar);
    document.getElementById('filtro-status').addEventListener('change', filtrar);
    document.getElementById('btn-novo').addEventListener('click', () => abrirModal());
    document.getElementById('btn-cancelar').addEventListener('click', fecharModal);
    document.getElementById('btn-salvar').addEventListener('click', salvar);
    document.getElementById('btn-ver-fechar').addEventListener('click', () => document.getElementById('modal-ver').classList.remove('open'));
    document.getElementById('btn-assinar').addEventListener('click', assinar);

    load();
  }

  async function load() {
    let q = supabaseClient.from('contratos').select('*').order('created_at', {ascending: false});
    if (clinicaId) q = q.eq('clinica_id', clinicaId);
    const { data } = await q;
    rows = data || [];
    filtrar();
  }

  function filtrar() {
    const q = document.getElementById('busca').value.toLowerCase();
    const s = document.getElementById('filtro-status').value;
    render(rows.filter(r => (!q || r.paciente_nome?.toLowerCase().includes(q) || r.tipo?.toLowerCase().includes(q)) && (!s || r.status === s)));
  }

  function statusBadge(s) {
    if (s === 'Assinado') return 'badge-success';
    if (s === 'Cancelado') return 'badge-danger';
    return 'badge-warning';
  }

  function render(lista) {
    const tbody = document.getElementById('tabela');
    if (!lista.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:#aaa">Nenhum contrato encontrado</td></tr>'; return; }
    tbody.innerHTML = lista.map(r => `
      <tr>
        <td style="padding:14px 18px"><strong>${r.paciente_nome}</strong></td>
        <td style="padding:14px 18px">${r.tipo||'-'}</td>
        <td style="padding:14px 18px">${r.data ? new Date(r.data+'T00:00:00').toLocaleDateString('pt-BR') : '-'}</td>
        <td style="padding:14px 18px">${r.procedimento||'-'}</td>
        <td style="padding:14px 18px"><span class="badge ${statusBadge(r.status)}">${r.status||'-'}</span></td>
        <td style="padding:14px 18px">
          <button class="btn-sm btn-primary" data-id="${r.id}" data-action="ver">👁️ Ver</button>
          <button class="btn-sm btn-outline" data-id="${r.id}" data-action="editar" style="margin-left:4px">✏️</button>
          <button class="btn-sm btn-outline" data-id="${r.id}" data-action="deletar" style="margin-left:4px">🗑️</button>
        </td>
      </tr>
    `).join('');
    tbody.querySelectorAll('button[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.action === 'ver') verModal(btn.dataset.id);
        else if (btn.dataset.action === 'editar') editar(btn.dataset.id);
        else deletar(btn.dataset.id);
      });
    });
  }

  function verModal(id) {
    verItem = rows.find(r => r.id === id);
    if (!verItem) return;
    document.getElementById('ver-titulo').textContent = `📄 ${verItem.tipo}`;
    document.getElementById('ver-info').innerHTML = `
      <strong>Paciente:</strong> ${verItem.paciente_nome}<br>
      <strong>Procedimento:</strong> ${verItem.procedimento||'-'}<br>
      <strong>Data:</strong> ${verItem.data ? new Date(verItem.data+'T00:00:00').toLocaleDateString('pt-BR') : '-'}<br>
      <strong>Status:</strong> ${verItem.status}
    `;
    document.getElementById('ver-conteudo').textContent = verItem.conteudo || 'Sem conteúdo cadastrado.';
    document.getElementById('btn-assinar').style.display = verItem.status === 'Assinado' ? 'none' : 'inline-block';
    document.getElementById('modal-ver').classList.add('open');
  }

  async function assinar() {
    if (!verItem) return;
    await supabaseClient.from('contratos').update({ status: 'Assinado' }).eq('id', verItem.id);
    showToast('Contrato marcado como assinado!', 'success');
    document.getElementById('modal-ver').classList.remove('open');
    load();
  }

  function abrirModal(dados=null) {
    editId = dados?.id || null;
    document.getElementById('modal-title').textContent = editId ? '✏️ Editar Contrato' : '📄 Novo Contrato';
    document.getElementById('f-paciente_nome').value = dados?.paciente_nome || '';
    document.getElementById('f-data').value = dados?.data || new Date().toISOString().split('T')[0];
    document.getElementById('f-tipo').value = dados?.tipo || 'Contrato Estético';
    document.getElementById('f-status').value = dados?.status || 'Pendente';
    document.getElementById('f-procedimento').value = dados?.procedimento || '';
    document.getElementById('f-conteudo').value = dados?.conteudo || '';
    document.getElementById('f-observacoes').value = dados?.observacoes || '';
    document.getElementById('modal').classList.add('open');
  }

  function fecharModal() { document.getElementById('modal').classList.remove('open'); }

  async function salvar() {
    const payload = {
      paciente_nome: document.getElementById('f-paciente_nome').value,
      data: document.getElementById('f-data').value,
      tipo: document.getElementById('f-tipo').value,
      status: document.getElementById('f-status').value,
      procedimento: document.getElementById('f-procedimento').value,
      conteudo: document.getElementById('f-conteudo').value,
      observacoes: document.getElementById('f-observacoes').value,
      clinica_id: clinicaId,
    };
    if (!payload.paciente_nome) { showToast('Informe o nome do paciente!', 'error'); return; }
    let erro;
    if (editId) {
      ({ error: erro } = await supabaseClient.from('contratos').update(payload).eq('id', editId));
    } else {
      ({ error: erro } = await supabaseClient.from('contratos').insert(payload));
    }
    if (erro) { showToast('Erro: ' + erro.message, 'error'); return; }
    showToast('Contrato salvo!', 'success'); fecharModal(); load();
  }

  function editar(id) { abrirModal(rows.find(r => r.id === id)); }

  async function deletar(id) {
    if (!confirm('Excluir contrato?')) return;
    await supabaseClient.from('contratos').delete().eq('id', id);
    showToast('Removido!'); load();
  }

  function showToast(msg, tipo='') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast show ${tipo}`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  init();
</script>
</body>
</html>
