<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medlyn - Contratos</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="logo"><span class="logo-icon">💙</span><span class="logo-text">Medlyn</span></div>
    <nav>
      <a href="index.html" class="nav-item">📅 Agenda</a>
      <a href="prontuario.html" class="nav-item">🧾 Prontuário</a>
      <a href="financeiro.html" class="nav-item">💰 Financeiro</a>
      <a href="estoque.html" class="nav-item">📦 Estoque</a>
      <a href="contratos.html" class="nav-item active">📄 Contratos</a>
      <a href="campanhas.html" class="nav-item">📢 Campanhas</a>
      <a href="pacientes.html" class="nav-item">👥 Pacientes</a>
      <a href="anamnese.html" class="nav-item">🧠 Anamnese</a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>📄 Contratos e Termos</h1>
      <button class="btn btn-purple" onclick="abrirModal()">+ Novo Contrato</button>
    </div>

    <div class="search-bar">
      <input type="text" id="busca" placeholder="Buscar por paciente ou tipo..." oninput="filtrar()" />
      <select id="filtro-status" onchange="filtrar()" style="padding:10px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:14px">
        <option value="">Todos</option>
        <option value="Pendente">Pendente</option>
        <option value="Assinado">Assinado</option>
        <option value="Cancelado">Cancelado</option>
      </select>
    </div>

    <div class="table-container">
      <table class="data-table">
        <thead>
          <tr><th>Paciente</th><th>Tipo</th><th>Data</th><th>Procedimento</th><th>Status</th><th>Ações</th></tr>
        </thead>
        <tbody id="tabela-contratos">
          <tr><td colspan="6" style="text-align:center;padding:40px;color:#aaa">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- MODAL CADASTRO -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>📄 Novo Contrato</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Paciente *</label>
        <input type="text" id="paciente_nome" placeholder="Nome do paciente" />
      </div>
      <div class="form-group">
        <label>Data *</label>
        <input type="date" id="data" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Tipo de Contrato</label>
        <select id="tipo">
          <option value="Contrato Estético">Contrato Estético</option>
          <option value="Contrato Botulínica">Contrato Botulínica</option>
          <option value="Termo de Consentimento">Termo de Consentimento</option>
          <option value="Contrato Geral">Contrato Geral</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="status">
          <option value="Pendente">Pendente</option>
          <option value="Assinado">Assinado</option>
          <option value="Cancelado">Cancelado</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Procedimento</label>
      <input type="text" id="procedimento" placeholder="Ex: Botox, Preenchimento labial..." />
    </div>
    <div class="form-group">
      <label>Conteúdo do Contrato</label>
      <textarea id="conteudo" rows="6" placeholder="Texto completo do contrato ou termo..."></textarea>
    </div>
    <div class="form-group">
      <label>Observações</label>
      <textarea id="observacoes" rows="2" placeholder="Notas adicionais..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-purple" onclick="salvar()">💾 Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL VISUALIZAR -->
<div class="modal-overlay" id="modal-ver">
  <div class="modal" style="max-width:640px">
    <h2 id="ver-titulo">Contrato</h2>
    <div id="ver-info" style="background:#f7f8fc;border-radius:8px;padding:16px;margin-bottom:16px;font-size:13px;line-height:1.8"></div>
    <div id="ver-conteudo" style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:20px;white-space:pre-wrap;font-size:14px;line-height:1.8;max-height:300px;overflow-y:auto"></div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="fecharVerModal()">Fechar</button>
      <button class="btn btn-purple" id="btn-assinar" onclick="assinarContrato()">✍️ Marcar como Assinado</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let contratos = [];
  let editId = null;
  let verContrato = null;

  async function load() {
    const { data } = await supabase.from('contratos').select('*').order('created_at', {ascending: false});
    contratos = data || [];
    filtrar();
  }

  function filtrar() {
    const q = document.getElementById('busca').value.toLowerCase();
    const s = document.getElementById('filtro-status').value;
    let rows = contratos;
    if (q) rows = rows.filter(r => r.paciente_nome?.toLowerCase().includes(q) || r.tipo?.toLowerCase().includes(q));
    if (s) rows = rows.filter(r => r.status === s);
    render(rows);
  }

  function render(rows) {
    const tbody = document.getElementById('tabela-contratos');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:#aaa">Nenhum contrato encontrado</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td><strong>${r.paciente_nome}</strong></td>
        <td>${r.tipo || '-'}</td>
        <td>${r.data ? new Date(r.data+'T00:00:00').toLocaleDateString('pt-BR') : '-'}</td>
        <td>${r.procedimento || '-'}</td>
        <td><span class="badge ${r.status === 'Assinado' ? 'badge-success' : r.status === 'Cancelado' ? 'badge-danger' : 'badge-warning'}">${r.status || '-'}</span></td>
        <td>
          <button class="btn-sm btn-primary" onclick="verModal('${r.id}')">👁️ Ver</button>
          <button class="btn-sm btn-outline" onclick="editar('${r.id}')" style="margin-left:4px">✏️</button>
          <button class="btn-sm btn-outline" onclick="deletar('${r.id}')" style="margin-left:4px">🗑️</button>
        </td>
      </tr>
    `).join('');
  }

  function verModal(id) {
    verContrato = contratos.find(c => c.id === id);
    if (!verContrato) return;
    document.getElementById('ver-titulo').textContent = `📄 ${verContrato.tipo}`;
    document.getElementById('ver-info').innerHTML = `
      <strong>Paciente:</strong> ${verContrato.paciente_nome}<br>
      <strong>Procedimento:</strong> ${verContrato.procedimento || '-'}<br>
      <strong>Data:</strong> ${verContrato.data ? new Date(verContrato.data+'T00:00:00').toLocaleDateString('pt-BR') : '-'}<br>
      <strong>Status:</strong> ${verContrato.status}
    `;
    document.getElementById('ver-conteudo').textContent = verContrato.conteudo || 'Sem conteúdo cadastrado.';
    document.getElementById('btn-assinar').style.display = verContrato.status === 'Assinado' ? 'none' : 'block';
    document.getElementById('modal-ver').classList.add('open');
  }

  function fecharVerModal() { document.getElementById('modal-ver').classList.remove('open'); }

  async function assinarContrato() {
    if (!verContrato) return;
    await supabase.from('contratos').update({ status: 'Assinado' }).eq('id', verContrato.id);
    showToast('Contrato marcado como assinado!', 'success');
    fecharVerModal();
    load();
  }

  function abrirModal(dados = null) {
    editId = dados?.id || null;
    document.getElementById('paciente_nome').value = dados?.paciente_nome || '';
    document.getElementById('data').value = dados?.data || new Date().toISOString().split('T')[0];
    document.getElementById('tipo').value = dados?.tipo || 'Contrato Estético';
    document.getElementById('status').value = dados?.status || 'Pendente';
    document.getElementById('procedimento').value = dados?.procedimento || '';
    document.getElementById('conteudo').value = dados?.conteudo || '';
    document.getElementById('observacoes').value = dados?.observacoes || '';
    document.getElementById('modal').classList.add('open');
  }

  function fecharModal() { document.getElementById('modal').classList.remove('open'); }

  async function salvar() {
    const payload = {
      paciente_nome: document.getElementById('paciente_nome').value,
      data: document.getElementById('data').value,
      tipo: document.getElementById('tipo').value,
      status: document.getElementById('status').value,
      procedimento: document.getElementById('procedimento').value,
      conteudo: document.getElementById('conteudo').value,
      observacoes: document.getElementById('observacoes').value,
    };
    let erro;
    if (editId) {
      ({ error: erro } = await supabase.from('contratos').update(payload).eq('id', editId));
    } else {
      ({ error: erro } = await supabase.from('contratos').insert(payload));
    }
    if (erro) { showToast('Erro: ' + erro.message, 'error'); return; }
    showToast('Contrato salvo!', 'success');
    fecharModal();
    load();
  }

  function editar(id) { abrirModal(contratos.find(c => c.id === id)); }

  async function deletar(id) {
    if (!confirm('Excluir contrato?')) return;
    await supabase.from('contratos').delete().eq('id', id);
    showToast('Removido!');
    load();
  }

  function showToast(msg, tipo = '') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast show ${tipo}`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  load();
</script>
</body>
</html>
