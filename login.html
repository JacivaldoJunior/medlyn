<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medlyn - Login</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  
  
  <style>
    body { background: linear-gradient(135deg, #1e1e2e 0%, #2d1b69 100%); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: white; border-radius: 20px; padding: 48px 40px; width: 400px; max-width: 95vw; box-shadow: 0 30px 80px rgba(0,0,0,0.3); }
    .login-logo { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 32px; }
    .login-logo span:first-child { font-size: 36px; }
    .login-logo span:last-child { font-size: 28px; font-weight: 700; color: #1e1e2e; }
    .login-title { font-size: 18px; font-weight: 600; color: #2d2d3a; margin-bottom: 6px; text-align: center; }
    .login-sub { font-size: 14px; color: #6b7280; margin-bottom: 32px; text-align: center; }
    .login-group { margin-bottom: 18px; }
    .login-group label { display: block; font-size: 13px; font-weight: 600; color: #6b7280; margin-bottom: 6px; }
    .login-group input { width: 100%; padding: 12px 16px; border: 1.5px solid #c8ccd6; border-radius: 10px; font-size: 15px; font-family: 'Inter', sans-serif; outline: none; box-sizing: border-box; transition: border .2s; }
    .login-group input:focus { border-color: #7c3aed; }
    .btn-login { width: 100%; padding: 13px; background: #7c3aed; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; margin-top: 8px; transition: background .2s; }
    .btn-login:hover { background: #6d28d9; }
    .login-error { background: #fee2e2; color: #ef4444; padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .login-error.show { display: block; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <span>💙</span>
      <span>Medlyn</span>
    </div>
    <div class="login-title">Bem-vindo de volta!</div>
    <div class="login-sub">Faça login para acessar o sistema</div>
    <div class="login-error" id="erro"></div>
    <div class="login-group">
      <label>Login (usuário)</label>
      <input type="text" id="login" placeholder="seu_usuario" />
    </div>
    <div class="login-group">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••" onkeydown="if(event.key==='Enter')entrar()" />
    </div>
    <button class="btn-login" onclick="entrar()">Entrar →</button>
  </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    // Se já logado, vai pro index
    if (localStorage.getItem('medlyn_user')) {
      window.location.href = 'index.html';
    }

    async function entrar() {
      const login = document.getElementById('login').value.trim();
      const senha = document.getElementById('senha').value;
      const erro = document.getElementById('erro');
      erro.classList.remove('show');

      if (!login || !senha) {
        erro.textContent = 'Preencha login e senha.';
        erro.classList.add('show');
        return;
      }

      // Busca usuário na tabela usuarios
      const { data: user, error } = await supabaseClient
        .from('usuarios')
        .select('*')
        .eq('login', login)
        .eq('senha', senha)
        .eq('ativo', true)
        .single();

      if (error || !user) {
        erro.textContent = 'Login ou senha incorretos.';
        erro.classList.add('show');
        return;
      }

      // Salva sessão local
      localStorage.setItem('medlyn_user', JSON.stringify(user));
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
