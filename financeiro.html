<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medlyn - Financeiro</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="logo"><span class="logo-icon">💙</span><span class="logo-text">Medlyn</span></div>
    <nav>
      <a href="index.html" class="nav-item">📅 Agenda</a>
      <a href="prontuario.html" class="nav-item">🧾 Prontuário</a>
      <a href="financeiro.html" class="nav-item active">💰 Financeiro</a>
      <a href="estoque.html" class="nav-item">📦 Estoque</a>
      <a href="contratos.html" class="nav-item">📄 Contratos</a>
      <a href="campanhas.html" class="nav-item">📢 Campanhas</a>
      <a href="pacientes.html" class="nav-item">👥 Pacientes</a>
      <a href="anamnese.html" class="nav-item">🧠 Anamnese</a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>💰 Financeiro</h1>
      <button class="btn btn-purple" onclick="abrirModal()">+ Nova Transação</button>
    </div>

    <!-- RESUMO -->
    <div class="cards-top" style="margin-bottom:24px">
      <div class="card card-white">
        <div class="card-icon">📈</div>
        <div>
          <div class="card-title">Receitas do Mês</div>
          <div class="card-value text-green" id="total-receitas">R$ 0,00</div>
        </div>
      </div>
      <div class="card card-white">
        <div class="card-icon">📉</div>
        <div>
          <div class="card-title">Despesas do Mês</div>
          <div class="card-value text-red" id="total-despesas">R$ 0,00</div>
        </div>
      </div>
      <div class="card card-dark">
        <div class="card-icon">💎</div>
        <div>
          <div class="card-title">Lucro Líquido</div>
          <div class="card-value" id="lucro-liquido">R$ 0,00</div>
        </div>
      </div>
    </div>

    <div class="search-bar">
      <input type="month" id="filtro-mes" onchange="load()" />
      <select id="filtro-tipo" onchange="filtrar()" style="padding:10px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:14px">
        <option value="">Todos</option>
        <option value="receita">Receitas</option>
        <option value="despesa">Despesas</option>
      </select>
      <input type="text" id="busca" placeholder="Buscar..." oninput="filtrar()" />
    </div>

    <div class="table-container">
      <table class="data-table">
        <thead>
          <tr><th>Descrição</th><th>Categoria</th><th>Data</th><th>Tipo</th><th>Forma Pgto</th><th>Valor</th><th>Ações</th></tr>
        </thead>
        <tbody id="tabela-financeiro">
          <tr><td colspan="7" style="text-align:center;padding:40px;color:#aaa">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>💰 Nova Transação</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Tipo *</label>
        <select id="tipo">
          <option value="receita">Receita</option>
          <option value="despesa">Despesa</option>
        </select>
      </div>
      <div class="form-group">
        <label>Data *</label>
        <input type="date" id="data" />
      </div>
    </div>
    <div class="form-group">
      <label>Descrição *</label>
      <input type="text" id="descricao" placeholder="Ex: Consulta Botox - Maria" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Categoria</label>
        <input type="text" id="categoria" placeholder="Ex: Procedimento, Aluguel..." />
      </div>
      <div class="form-group">
        <label>Valor (R$) *</label>
        <input type="number" id="valor" placeholder="0,00" step="0.01" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Forma de Pagamento</label>
        <select id="forma_pagamento">
          <option value="Dinheiro">Dinheiro</option>
          <option value="PIX">PIX</option>
          <option value="Cartão Débito">Cartão Débito</option>
          <option value="Cartão Crédito">Cartão Crédito</option>
          <option value="Transferência">Transferência</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="status_pgto">
          <option value="Pago">Pago</option>
          <option value="Pendente">Pendente</option>
          <option value="Cancelado">Cancelado</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Paciente / Fornecedor</label>
      <input type="text" id="paciente" placeholder="Nome..." />
    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-purple" onclick="salvar()">💾 Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let registros = [];
  let editId = null;

  async function load() {
    const mes = document.getElementById('filtro-mes').value;
    let query = supabase.from('financeiro').select('*').order('data', {ascending: false});
    if (mes) {
      query = query.gte('data', mes + '-01').lte('data', mes + '-31');
    }
    const { data } = await query;
    registros = data || [];

    const receitas = registros.filter(r => r.tipo === 'receita').reduce((a, r) => a + (r.valor || 0), 0);
    const despesas = registros.filter(r => r.tipo === 'despesa').reduce((a, r) => a + (r.valor || 0), 0);
    document.getElementById('total-receitas').textContent = fmt(receitas);
    document.getElementById('total-despesas').textContent = fmt(despesas);
    document.getElementById('lucro-liquido').textContent = fmt(receitas - despesas);

    filtrar();
  }

  function filtrar() {
    const tipo = document.getElementById('filtro-tipo').value;
    const q = document.getElementById('busca').value.toLowerCase();
    let rows = registros;
    if (tipo) rows = rows.filter(r => r.tipo === tipo);
    if (q) rows = rows.filter(r => r.descricao?.toLowerCase().includes(q) || r.categoria?.toLowerCase().includes(q));
    render(rows);
  }

  function render(rows) {
    const tbody = document.getElementById('tabela-financeiro');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#aaa">Nenhum registro</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td><strong>${r.descricao || '-'}</strong></td>
        <td>${r.categoria || '-'}</td>
        <td>${r.data ? new Date(r.data+'T00:00:00').toLocaleDateString('pt-BR') : '-'}</td>
        <td><span class="badge ${r.tipo === 'receita' ? 'badge-success' : 'badge-danger'}">${r.tipo === 'receita' ? '📈 Receita' : '📉 Despesa'}</span></td>
        <td>${r.forma_pagamento || '-'}</td>
        <td class="${r.tipo === 'receita' ? 'text-green' : 'text-red'}"><strong>${fmt(r.valor)}</strong></td>
        <td>
          <button class="btn-sm btn-outline" onclick="editar('${r.id}')">✏️</button>
          <button class="btn-sm btn-outline" onclick="deletar('${r.id}')" style="margin-left:4px">🗑️</button>
        </td>
      </tr>
    `).join('');
  }

  function fmt(v) { return `R$ ${(v || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`; }

  function abrirModal(dados = null) {
    editId = dados?.id || null;
    document.getElementById('tipo').value = dados?.tipo || 'receita';
    document.getElementById('data').value = dados?.data || new Date().toISOString().split('T')[0];
    document.getElementById('descricao').value = dados?.descricao || '';
    document.getElementById('categoria').value = dados?.categoria || '';
    document.getElementById('valor').value = dados?.valor || '';
    document.getElementById('forma_pagamento').value = dados?.forma_pagamento || 'PIX';
    document.getElementById('status_pgto').value = dados?.status_pgto || 'Pago';
    document.getElementById('paciente').value = dados?.paciente || '';
    document.getElementById('modal').classList.add('open');
  }

  function fecharModal() { document.getElementById('modal').classList.remove('open'); }

  async function salvar() {
    const payload = {
      tipo: document.getElementById('tipo').value,
      data: document.getElementById('data').value,
      descricao: document.getElementById('descricao').value,
      categoria: document.getElementById('categoria').value,
      valor: parseFloat(document.getElementById('valor').value) || 0,
      forma_pagamento: document.getElementById('forma_pagamento').value,
      status_pgto: document.getElementById('status_pgto').value,
      paciente: document.getElementById('paciente').value,
    };
    let erro;
    if (editId) {
      ({ error: erro } = await supabase.from('financeiro').update(payload).eq('id', editId));
    } else {
      ({ error: erro } = await supabase.from('financeiro').insert(payload));
    }
    if (erro) { showToast('Erro: ' + erro.message, 'error'); return; }
    showToast('Salvo!', 'success');
    fecharModal();
    load();
  }

  function editar(id) {
    const r = registros.find(x => x.id === id);
    if (r) abrirModal(r);
  }

  async function deletar(id) {
    if (!confirm('Excluir registro?')) return;
    await supabase.from('financeiro').delete().eq('id', id);
    showToast('Removido!');
    load();
  }

  function showToast(msg, tipo = '') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast show ${tipo}`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  const mesAtual = new Date().toISOString().slice(0, 7);
  document.getElementById('filtro-mes').value = mesAtual;
  load();
</script>
</body>
</html>
