<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medlyn - Financeiro</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="logo"><span class="logo-icon">💙</span><span class="logo-text">Medlyn</span></div>
    <nav>
      <a href="index.html" class="nav-item">🏠 Dashboard</a>
      <a href="agenda.html" class="nav-item">📅 Agenda</a>
      <a href="prontuario.html" class="nav-item">🧾 Prontuário</a>
      <a href="financeiro.html" class="nav-item active">💰 Financeiro</a>
      <a href="estoque.html" class="nav-item">📦 Estoque</a>
      <a href="contratos.html" class="nav-item">📄 Contratos</a>
      <a href="campanhas.html" class="nav-item">📢 Campanhas</a>
      <a href="pacientes.html" class="nav-item">👥 Pacientes</a>
      <a href="anamnese.html" class="nav-item">🧠 Anamnese</a>
      <a href="usuarios.html" class="nav-item" id="nav-admin" style="display:none">⚙️ Usuários</a>
    </nav>
    <div style="margin-top:auto;padding-top:20px;border-top:1px solid rgba(0,0,0,0.1)">
      <div style="font-weight:600;font-size:14px" id="user-name">-</div>
      <button onclick="logout()" style="margin-top:8px;width:100%;padding:8px;border-radius:8px;border:1.5px solid #c8ccd6;background:white;cursor:pointer;font-size:13px;font-family:inherit">🚪 Sair</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>💰 Financeiro</h1>
      <button class="btn btn-purple" id="btn-novo">+ Nova Transação</button>
    </div>

    <div class="cards-top" style="margin-bottom:24px">
      <div class="card card-white"><div class="card-icon">📈</div><div><div class="card-title">Receitas</div><div class="card-value text-green" id="total-receitas">R$ 0,00</div></div></div>
      <div class="card card-white"><div class="card-icon">📉</div><div><div class="card-title">Despesas</div><div class="card-value text-red" id="total-despesas">R$ 0,00</div></div></div>
      <div class="card card-dark"><div class="card-icon">💎</div><div><div class="card-title">Lucro Líquido</div><div class="card-value" id="lucro-liquido">R$ 0,00</div></div></div>
    </div>

    <div class="search-bar">
      <input type="month" id="filtro-mes"/>
      <select id="filtro-tipo" style="padding:10px 16px;border:1.5px solid #c8ccd6;border-radius:10px;font-size:14px;font-family:inherit">
        <option value="">Todos</option><option value="receita">Receitas</option><option value="despesa">Despesas</option>
      </select>
      <input type="text" id="busca" placeholder="Buscar..."/>
    </div>

    <div class="table-container">
      <table class="data-table">
        <thead><tr><th>Descrição</th><th>Categoria</th><th>Data</th><th>Tipo</th><th>Forma Pgto</th><th>Valor</th><th>Ações</th></tr></thead>
        <tbody id="tabela"></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">💰 Nova Transação</h2>
    <div class="form-row">
      <div class="form-group"><label>Tipo *</label>
        <select id="f-tipo"><option value="receita">Receita</option><option value="despesa">Despesa</option></select>
      </div>
      <div class="form-group"><label>Data *</label><input type="date" id="f-data"/></div>
    </div>
    <div class="form-group"><label>Descrição *</label><input type="text" id="f-descricao" placeholder="Ex: Consulta Botox - Maria"/></div>
    <div class="form-row">
      <div class="form-group"><label>Categoria</label><input type="text" id="f-categoria" placeholder="Ex: Procedimento, Aluguel..."/></div>
      <div class="form-group"><label>Valor (R$) *</label><input type="number" id="f-valor" placeholder="0,00" step="0.01"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Forma de Pagamento</label>
        <select id="f-forma_pagamento">
          <option>Dinheiro</option><option>PIX</option><option>Cartão Débito</option><option>Cartão Crédito</option><option>Transferência</option>
        </select>
      </div>
      <div class="form-group"><label>Status</label>
        <select id="f-status_pgto"><option>Pago</option><option>Pendente</option><option>Cancelado</option></select>
      </div>
    </div>
    <div class="form-group"><label>Paciente / Fornecedor</label><input type="text" id="f-paciente" placeholder="Nome..."/></div>
    <div class="modal-footer">
      <button class="btn btn-gray" id="btn-cancelar">Cancelar</button>
      <button class="btn btn-purple" id="btn-salvar">💾 Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let rows = [], editId = null, clinicaId = null;
  const fmt = v => `R$ ${(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}`;

  async function init() {
    const user = await checkAuth();
    if (!user) return;
    clinicaId = user.clinica_id;
    renderUserHeader();
    if (user.perfil === 'admin') document.getElementById('nav-admin').style.display = 'flex';

    document.getElementById('filtro-mes').value = new Date().toISOString().slice(0,7);
    document.getElementById('filtro-mes').addEventListener('change', load);
    document.getElementById('filtro-tipo').addEventListener('change', filtrar);
    document.getElementById('busca').addEventListener('input', filtrar);
    document.getElementById('btn-novo').addEventListener('click', () => abrirModal());
    document.getElementById('btn-cancelar').addEventListener('click', fecharModal);
    document.getElementById('btn-salvar').addEventListener('click', salvar);

    load();
  }

  async function load() {
    const mes = document.getElementById('filtro-mes').value;
    let q = supabase.from('financeiro').select('*').order('data', {ascending:false});
    if (mes) q = q.gte('data', mes+'-01').lte('data', mes+'-31');
    if (clinicaId) q = q.eq('clinica_id', clinicaId);
    const { data } = await q;
    rows = data || [];

    const rec = rows.filter(r=>r.tipo==='receita').reduce((a,r)=>a+(r.valor||0),0);
    const desp = rows.filter(r=>r.tipo==='despesa').reduce((a,r)=>a+(r.valor||0),0);
    document.getElementById('total-receitas').textContent = fmt(rec);
    document.getElementById('total-despesas').textContent = fmt(desp);
    document.getElementById('lucro-liquido').textContent = fmt(rec-desp);
    filtrar();
  }

  function filtrar() {
    const tipo = document.getElementById('filtro-tipo').value;
    const q = document.getElementById('busca').value.toLowerCase();
    render(rows.filter(r => (!tipo||r.tipo===tipo) && (!q||r.descricao?.toLowerCase().includes(q))));
  }

  function render(lista) {
    const tbody = document.getElementById('tabela');
    if (!lista.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#aaa">Nenhum registro</td></tr>'; return; }
    tbody.innerHTML = lista.map(r => `
      <tr>
        <td style="padding:14px 18px"><strong>${r.descricao||'-'}</strong></td>
        <td style="padding:14px 18px">${r.categoria||'-'}</td>
        <td style="padding:14px 18px">${r.data ? new Date(r.data+'T00:00:00').toLocaleDateString('pt-BR') : '-'}</td>
        <td style="padding:14px 18px"><span class="badge ${r.tipo==='receita'?'badge-success':'badge-danger'}">${r.tipo==='receita'?'📈 Receita':'📉 Despesa'}</span></td>
        <td style="padding:14px 18px">${r.forma_pagamento||'-'}</td>
        <td style="padding:14px 18px"><strong style="color:${r.tipo==='receita'?'#10b981':'#ef4444'}">${fmt(r.valor)}</strong></td>
        <td style="padding:14px 18px">
          <button class="btn-sm btn-outline" data-id="${r.id}" data-action="editar">✏️</button>
          <button class="btn-sm btn-outline" data-id="${r.id}" data-action="deletar" style="margin-left:4px">🗑️</button>
        </td>
      </tr>
    `).join('');
    document.getElementById('tabela').querySelectorAll('button[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.action==='editar') editar(btn.dataset.id);
        else deletar(btn.dataset.id);
      });
    });
  }

  function abrirModal(dados=null) {
    editId = dados?.id||null;
    document.getElementById('modal-title').textContent = editId ? '✏️ Editar Transação' : '💰 Nova Transação';
    document.getElementById('f-tipo').value = dados?.tipo||'receita';
    document.getElementById('f-data').value = dados?.data||new Date().toISOString().split('T')[0];
    document.getElementById('f-descricao').value = dados?.descricao||'';
    document.getElementById('f-categoria').value = dados?.categoria||'';
    document.getElementById('f-valor').value = dados?.valor||'';
    document.getElementById('f-forma_pagamento').value = dados?.forma_pagamento||'PIX';
    document.getElementById('f-status_pgto').value = dados?.status_pgto||'Pago';
    document.getElementById('f-paciente').value = dados?.paciente||'';
    document.getElementById('modal').classList.add('open');
  }

  function fecharModal() { document.getElementById('modal').classList.remove('open'); }

  async function salvar() {
    const payload = {
      tipo: document.getElementById('f-tipo').value,
      data: document.getElementById('f-data').value,
      descricao: document.getElementById('f-descricao').value,
      categoria: document.getElementById('f-categoria').value,
      valor: parseFloat(document.getElementById('f-valor').value)||0,
      forma_pagamento: document.getElementById('f-forma_pagamento').value,
      status_pgto: document.getElementById('f-status_pgto').value,
      paciente: document.getElementById('f-paciente').value,
      clinica_id: clinicaId,
    };
    if (!payload.descricao) { showToast('Informe a descrição!', 'error'); return; }
    let erro;
    if (editId) {
      ({ error: erro } = await supabase.from('financeiro').update(payload).eq('id', editId));
    } else {
      ({ error: erro } = await supabase.from('financeiro').insert(payload));
    }
    if (erro) { showToast('Erro: '+erro.message, 'error'); return; }
    showToast('Salvo!', 'success'); fecharModal(); load();
  }

  function editar(id) { abrirModal(rows.find(r=>r.id===id)); }
  async function deletar(id) {
    if (!confirm('Excluir registro?')) return;
    await supabase.from('financeiro').delete().eq('id', id);
    showToast('Removido!'); load();
  }

  function showToast(msg, tipo='') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast show ${tipo}`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  init();
</script>
</body>
</html>
