<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medlyn - Estoque</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="logo"><span class="logo-icon">💙</span><span class="logo-text">Medlyn</span></div>
    <nav>
      <a href="index.html" class="nav-item">📅 Agenda</a>
      <a href="prontuario.html" class="nav-item">🧾 Prontuário</a>
      <a href="financeiro.html" class="nav-item">💰 Financeiro</a>
      <a href="estoque.html" class="nav-item active">📦 Estoque</a>
      <a href="contratos.html" class="nav-item">📄 Contratos</a>
      <a href="campanhas.html" class="nav-item">📢 Campanhas</a>
      <a href="pacientes.html" class="nav-item">👥 Pacientes</a>
      <a href="anamnese.html" class="nav-item">🧠 Anamnese</a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>📦 Controle de Estoque</h1>
      <button class="btn btn-purple" onclick="abrirModal()">+ Novo Item</button>
    </div>

    <div class="search-bar">
      <input type="text" id="busca" placeholder="Buscar produto..." oninput="filtrar()" />
      <select id="filtro-cat" onchange="filtrar()" style="padding:10px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:14px">
        <option value="">Todas categorias</option>
        <option value="Insumos">Insumos</option>
        <option value="Medicamentos">Medicamentos</option>
        <option value="Equipamentos">Equipamentos</option>
        <option value="Cosméticos">Cosméticos</option>
        <option value="Outros">Outros</option>
      </select>
    </div>

    <div class="table-container">
      <table class="data-table">
        <thead>
          <tr><th>Produto</th><th>Categoria</th><th>Qtd Atual</th><th>Qtd Mínima</th><th>Unidade</th><th>Validade</th><th>Status</th><th>Ações</th></tr>
        </thead>
        <tbody id="tabela-estoque">
          <tr><td colspan="8" style="text-align:center;padding:40px;color:#aaa">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>📦 Cadastro de Item</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Nome do Produto *</label>
        <input type="text" id="nome" placeholder="Ex: Toxina Botulínica" />
      </div>
      <div class="form-group">
        <label>Categoria</label>
        <select id="categoria">
          <option value="Insumos">Insumos</option>
          <option value="Medicamentos">Medicamentos</option>
          <option value="Equipamentos">Equipamentos</option>
          <option value="Cosméticos">Cosméticos</option>
          <option value="Outros">Outros</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Quantidade Atual</label>
        <input type="number" id="quantidade" placeholder="0" />
      </div>
      <div class="form-group">
        <label>Quantidade Mínima (alerta)</label>
        <input type="number" id="quantidade_minima" placeholder="5" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Unidade</label>
        <select id="unidade">
          <option value="unidade">Unidade</option>
          <option value="ml">mL</option>
          <option value="mg">mg</option>
          <option value="caixa">Caixa</option>
          <option value="frasco">Frasco</option>
          <option value="ampola">Ampola</option>
        </select>
      </div>
      <div class="form-group">
        <label>Validade</label>
        <input type="date" id="validade" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Custo Unitário (R$)</label>
        <input type="number" id="custo" placeholder="0,00" step="0.01" />
      </div>
      <div class="form-group">
        <label>Fornecedor</label>
        <input type="text" id="fornecedor" placeholder="Nome do fornecedor" />
      </div>
    </div>
    <div class="form-group">
      <label>Observações</label>
      <textarea id="observacoes" rows="2" placeholder="Notas sobre o produto..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-purple" onclick="salvar()">💾 Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let itens = [];
  let editId = null;

  async function load() {
    const { data } = await supabase.from('estoque').select('*').order('nome');
    itens = data || [];
    filtrar();
  }

  function filtrar() {
    const q = document.getElementById('busca').value.toLowerCase();
    const cat = document.getElementById('filtro-cat').value;
    let rows = itens;
    if (q) rows = rows.filter(r => r.nome?.toLowerCase().includes(q));
    if (cat) rows = rows.filter(r => r.categoria === cat);
    render(rows);
  }

  function render(rows) {
    const tbody = document.getElementById('tabela-estoque');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:#aaa">Nenhum item encontrado</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(r => {
      const baixo = r.quantidade <= (r.quantidade_minima || 5);
      const vencido = r.validade && new Date(r.validade) < new Date();
      return `
        <tr>
          <td><strong>${r.nome}</strong></td>
          <td>${r.categoria || '-'}</td>
          <td class="${baixo ? 'text-red' : 'text-green'}"><strong>${r.quantidade || 0}</strong></td>
          <td>${r.quantidade_minima || '-'}</td>
          <td>${r.unidade || '-'}</td>
          <td class="${vencido ? 'text-red' : ''}">${r.validade ? new Date(r.validade+'T00:00:00').toLocaleDateString('pt-BR') : '-'}</td>
          <td>
            ${vencido ? '<span class="badge badge-danger">Vencido</span>' :
              baixo ? '<span class="badge badge-warning">Estoque Baixo</span>' :
              '<span class="badge badge-success">OK</span>'}
          </td>
          <td>
            <button class="btn-sm btn-outline" onclick="editar('${r.id}')">✏️</button>
            <button class="btn-sm btn-outline" onclick="deletar('${r.id}')" style="margin-left:4px">🗑️</button>
          </td>
        </tr>
      `;
    }).join('');
  }

  function abrirModal(dados = null) {
    editId = dados?.id || null;
    document.getElementById('nome').value = dados?.nome || '';
    document.getElementById('categoria').value = dados?.categoria || 'Insumos';
    document.getElementById('quantidade').value = dados?.quantidade || '';
    document.getElementById('quantidade_minima').value = dados?.quantidade_minima || '';
    document.getElementById('unidade').value = dados?.unidade || 'unidade';
    document.getElementById('validade').value = dados?.validade || '';
    document.getElementById('custo').value = dados?.custo || '';
    document.getElementById('fornecedor').value = dados?.fornecedor || '';
    document.getElementById('observacoes').value = dados?.observacoes || '';
    document.getElementById('modal').classList.add('open');
  }

  function fecharModal() { document.getElementById('modal').classList.remove('open'); }

  async function salvar() {
    const payload = {
      nome: document.getElementById('nome').value,
      categoria: document.getElementById('categoria').value,
      quantidade: parseInt(document.getElementById('quantidade').value) || 0,
      quantidade_minima: parseInt(document.getElementById('quantidade_minima').value) || 5,
      unidade: document.getElementById('unidade').value,
      validade: document.getElementById('validade').value || null,
      custo: parseFloat(document.getElementById('custo').value) || 0,
      fornecedor: document.getElementById('fornecedor').value,
      observacoes: document.getElementById('observacoes').value,
    };
    let erro;
    if (editId) {
      ({ error: erro } = await supabase.from('estoque').update(payload).eq('id', editId));
    } else {
      ({ error: erro } = await supabase.from('estoque').insert(payload));
    }
    if (erro) { showToast('Erro: ' + erro.message, 'error'); return; }
    showToast('Salvo!', 'success');
    fecharModal();
    load();
  }

  function editar(id) { abrirModal(itens.find(i => i.id === id)); }

  async function deletar(id) {
    if (!confirm('Excluir item?')) return;
    await supabase.from('estoque').delete().eq('id', id);
    showToast('Removido!');
    load();
  }

  function showToast(msg, tipo = '') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast show ${tipo}`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  load();
</script>
</body>
</html>
