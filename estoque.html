<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medlyn - Estoque</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  
  
  
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="logo"><span class="logo-icon">💙</span><span class="logo-text">Medlyn</span></div>
    <nav>
      <a href="index.html" class="nav-item">🏠 Dashboard</a>
      <a href="agenda.html" class="nav-item">📅 Agenda</a>
      <a href="prontuario.html" class="nav-item">🧾 Prontuário</a>
      <a href="financeiro.html" class="nav-item">💰 Financeiro</a>
      <a href="estoque.html" class="nav-item active">📦 Estoque</a>
      <a href="contratos.html" class="nav-item">📄 Contratos</a>
      <a href="campanhas.html" class="nav-item">📢 Campanhas</a>
      <a href="pacientes.html" class="nav-item">👥 Pacientes</a>
      <a href="anamnese.html" class="nav-item">🧠 Anamnese</a>
      <a href="usuarios.html" class="nav-item" id="nav-admin" style="display:none">⚙️ Usuários</a>
    </nav>
    <div style="margin-top:auto;padding-top:20px;border-top:1px solid rgba(0,0,0,0.1)">
      <div style="font-weight:600;font-size:14px" id="user-name">-</div>
      <button onclick="logout()" style="margin-top:8px;width:100%;padding:8px;border-radius:8px;border:1.5px solid #c8ccd6;background:white;cursor:pointer;font-size:13px;font-family:inherit">🚪 Sair</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>📦 Controle de Estoque</h1>
      <button class="btn btn-purple" id="btn-novo">+ Novo Item</button>
    </div>
    <div class="search-bar">
      <input type="text" id="busca" placeholder="Buscar produto..."/>
      <select id="filtro-cat" style="padding:10px 16px;border:1.5px solid #c8ccd6;border-radius:10px;font-size:14px;font-family:inherit">
        <option value="">Todas categorias</option>
        <option>Insumos</option><option>Medicamentos</option><option>Equipamentos</option><option>Cosméticos</option><option>Outros</option>
      </select>
    </div>
    <div class="table-container">
      <table class="data-table">
        <thead><tr><th>Produto</th><th>Categoria</th><th>Qtd Atual</th><th>Qtd Mínima</th><th>Unidade</th><th>Validade</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody id="tabela"></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">📦 Novo Item</h2>
    <div class="form-row">
      <div class="form-group"><label>Nome do Produto *</label><input type="text" id="f-nome" placeholder="Ex: Toxina Botulínica"/></div>
      <div class="form-group"><label>Categoria</label>
        <select id="f-categoria"><option>Insumos</option><option>Medicamentos</option><option>Equipamentos</option><option>Cosméticos</option><option>Outros</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Quantidade Atual</label><input type="number" id="f-quantidade" placeholder="0"/></div>
      <div class="form-group"><label>Quantidade Mínima (alerta)</label><input type="number" id="f-quantidade_minima" placeholder="5"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Unidade</label>
        <select id="f-unidade"><option>unidade</option><option>ml</option><option>mg</option><option>caixa</option><option>frasco</option><option>ampola</option></select>
      </div>
      <div class="form-group"><label>Validade</label><input type="date" id="f-validade"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Custo Unitário (R$)</label><input type="number" id="f-custo" placeholder="0,00" step="0.01"/></div>
      <div class="form-group"><label>Fornecedor</label><input type="text" id="f-fornecedor" placeholder="Nome do fornecedor"/></div>
    </div>
    <div class="form-group"><label>Observações</label><textarea id="f-observacoes" rows="2" placeholder="Notas..."></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-gray" id="btn-cancelar">Cancelar</button>
      <button class="btn btn-purple" id="btn-salvar">💾 Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
  let rows = [], editId = null, clinicaId = null;

  async function init() {
    const user = await checkAuth();
    if (!user) return;
    clinicaId = user.clinica_id;
    renderUserHeader();
    if (user.perfil === 'admin') document.getElementById('nav-admin').style.display = 'flex';

    document.getElementById('busca').addEventListener('input', filtrar);
    document.getElementById('filtro-cat').addEventListener('change', filtrar);
    document.getElementById('btn-novo').addEventListener('click', () => abrirModal());
    document.getElementById('btn-cancelar').addEventListener('click', fecharModal);
    document.getElementById('btn-salvar').addEventListener('click', salvar);

    load();
  }

  async function load() {
    let q = supabaseClient.from('estoque').select('*').order('nome');
    if (clinicaId) q = q.eq('clinica_id', clinicaId);
    const { data } = await q;
    rows = data || [];
    filtrar();
  }

  function filtrar() {
    const q = document.getElementById('busca').value.toLowerCase();
    const cat = document.getElementById('filtro-cat').value;
    render(rows.filter(r => (!q||r.nome?.toLowerCase().includes(q)) && (!cat||r.categoria===cat)));
  }

  function render(lista) {
    const tbody = document.getElementById('tabela');
    if (!lista.length) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:#aaa">Nenhum item encontrado</td></tr>'; return; }
    tbody.innerHTML = lista.map(r => {
      const baixo = r.quantidade <= (r.quantidade_minima||5);
      const vencido = r.validade && new Date(r.validade) < new Date();
      return `<tr>
        <td style="padding:14px 18px"><strong>${r.nome}</strong></td>
        <td style="padding:14px 18px">${r.categoria||'-'}</td>
        <td style="padding:14px 18px;color:${baixo?'#ef4444':'#10b981'};font-weight:700">${r.quantidade??0}</td>
        <td style="padding:14px 18px">${r.quantidade_minima||'-'}</td>
        <td style="padding:14px 18px">${r.unidade||'-'}</td>
        <td style="padding:14px 18px;color:${vencido?'#ef4444':'inherit'}">${r.validade?new Date(r.validade+'T00:00:00').toLocaleDateString('pt-BR'):'-'}</td>
        <td style="padding:14px 18px">${vencido?'<span class="badge badge-danger">Vencido</span>':baixo?'<span class="badge badge-warning">Estoque Baixo</span>':'<span class="badge badge-success">OK</span>'}</td>
        <td style="padding:14px 18px">
          <button class="btn-sm btn-outline" data-id="${r.id}" data-action="editar">✏️</button>
          <button class="btn-sm btn-outline" data-id="${r.id}" data-action="deletar" style="margin-left:4px">🗑️</button>
        </td>
      </tr>`;
    }).join('');
    document.getElementById('tabela').querySelectorAll('button[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.action==='editar') editar(btn.dataset.id);
        else deletar(btn.dataset.id);
      });
    });
  }

  function abrirModal(dados=null) {
    editId = dados?.id||null;
    document.getElementById('modal-title').textContent = editId ? '✏️ Editar Item' : '📦 Novo Item';
    document.getElementById('f-nome').value = dados?.nome||'';
    document.getElementById('f-categoria').value = dados?.categoria||'Insumos';
    document.getElementById('f-quantidade').value = dados?.quantidade??'';
    document.getElementById('f-quantidade_minima').value = dados?.quantidade_minima??'5';
    document.getElementById('f-unidade').value = dados?.unidade||'unidade';
    document.getElementById('f-validade').value = dados?.validade||'';
    document.getElementById('f-custo').value = dados?.custo||'';
    document.getElementById('f-fornecedor').value = dados?.fornecedor||'';
    document.getElementById('f-observacoes').value = dados?.observacoes||'';
    document.getElementById('modal').classList.add('open');
  }

  function fecharModal() { document.getElementById('modal').classList.remove('open'); }

  async function salvar() {
    const payload = {
      nome: document.getElementById('f-nome').value,
      categoria: document.getElementById('f-categoria').value,
      quantidade: parseInt(document.getElementById('f-quantidade').value)||0,
      quantidade_minima: parseInt(document.getElementById('f-quantidade_minima').value)||5,
      unidade: document.getElementById('f-unidade').value,
      validade: document.getElementById('f-validade').value||null,
      custo: parseFloat(document.getElementById('f-custo').value)||0,
      fornecedor: document.getElementById('f-fornecedor').value,
      observacoes: document.getElementById('f-observacoes').value,
      clinica_id: clinicaId,
    };
    if (!payload.nome) { showToast('Informe o nome do produto!', 'error'); return; }
    let erro;
    if (editId) {
      ({ error: erro } = await supabaseClient.from('estoque').update(payload).eq('id', editId));
    } else {
      ({ error: erro } = await supabaseClient.from('estoque').insert(payload));
    }
    if (erro) { showToast('Erro: '+erro.message, 'error'); return; }
    showToast('Salvo!', 'success'); fecharModal(); load();
  }

  function editar(id) { abrirModal(rows.find(r=>r.id===id)); }
  async function deletar(id) {
    if (!confirm('Excluir item?')) return;
    await supabaseClient.from('estoque').delete().eq('id', id);
    showToast('Removido!'); load();
  }

  function showToast(msg, tipo='') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast show ${tipo}`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  init();
</script>
</body>
</html>
